name: Build & Package — VS Code Extension

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/adapters/vscode/**'
      - 'packages/core/**'
      - 'packages/mcp/**'
      - 'teams/**/manifests/vscode.json'
      - 'scripts/build.js'
  pull_request:
    paths:
      - 'packages/adapters/vscode/**'
      - 'packages/core/**'
      - 'teams/**'
  workflow_dispatch:
    inputs:
      team:
        description: 'Team to build (empty = all teams)'
        required: false
        default: ''
        type: choice
        options: ['', 'team-a', 'team-b', 'team-c', 'team-d']
      publish:
        description: 'Publish to VS Code Marketplace?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  build:
    name: Build ${{ matrix.team }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        team: [team-a, team-b, team-c, team-d]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo run lint --filter=@omni/adapters-vscode

      - name: Build & package
        run: node scripts/build.js --team ${{ matrix.team }} --ide vscode --out artifacts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-${{ matrix.team }}
          path: artifacts/omni-vscode-${{ matrix.team }}-*.vsix
          retention-days: 30

  deploy:
    name: Publish ${{ matrix.team }}
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.publish == 'true'
    strategy:
      fail-fast: false
      matrix:
        team: [team-a, team-b, team-c, team-d]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: vscode-${{ matrix.team }}
          path: artifacts

      - name: Publish to Visual Studio Marketplace
        run: node scripts/deploy.js --team ${{ matrix.team }} --ide vscode
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
