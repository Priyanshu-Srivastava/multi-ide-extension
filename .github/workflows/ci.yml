# =============================================================================
# ci.yml — Single unified pipeline for the entire monorepo.
#
# JOB FLOW
# ─────────────────────────────────────────────────────────────────────────────
#
#  ┌─────────────────────────────────────────────────────────────────────────┐
#  │  validate-specs  (runs only when specs/ or validate-spec.js change)     │
#  └─────────────────────────────────────────────────────────────────────────┘
#
#  ┌─────────────────────────────────────────────────────────────────────────┐
#  │  ci-controller   (runs only when controller/ or shared packages change) │
#  └─────────────────────────────────────────────────────────────────────────┘
#
#  ┌─────────────────────────────────────────────────────────────────────────┐
#  │  ci-team  (matrix: team-a / team-b / team-c / team-d)                   │
#  │  Runs only when that team's code or shared packages change.             │
#  │  Steps: install → build (turborepo scoped) → lint → test → validate     │
#  └─────────────────────────────────────────────────────────────────────────┘
#
#  ┌─────────────────────────────────────────────────────────────────────────┐
#  │  build-artifacts  (matrix: team × ide)  — needs: ci-team               │
#  │  Builds .vsix / .zip for each team+ide combination.                    │
#  │  • All branches → upload as GHA artifacts (14d, "prerelease")           │
#  │  • main push   → also commits to releases/<version>/ + GitHub Release   │
#  └─────────────────────────────────────────────────────────────────────────┘
#
#  ┌──────────────┐  ┌──────────────┐  ┌──────────────┐  ┌──────────────┐
#  │ deploy-team-a│  │ deploy-team-b│  │ deploy-team-c│  │ deploy-team-d│
#  │ needs: release  needs: release  needs: release    needs: release   │
#  │ Isolated per-team marketplace publish (manual trigger, main only)   │
#  └──────────────┘  └──────────────┘  └──────────────┘  └──────────────┘
#
# =============================================================================
name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_team:
        description: 'Deploy a specific team to marketplaces (main only)'
        required: false
        default: ''
        type: choice
        options: ['', 'team-a', 'team-b', 'team-c', 'team-d']

permissions:
  contents: write   # needed for git push to releases/ and gh release create

# ─────────────────────────────────────────────────────────────────────────────
# SHARED setup composite — reused across jobs via inline steps
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # 0 · Detect changed paths  (used by validate-specs and ci-controller)
  # ───────────────────────────────────────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      specs:      ${{ steps.filter.outputs.specs }}
      controller: ${{ steps.filter.outputs.controller }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            specs:
              - 'teams/**'
              - 'scripts/validate-spec.js'
            controller:
              - 'controller/**'
              - 'packages/core/**'
              - 'packages/telemetry/**'

  # ───────────────────────────────────────────────────────────────────────────
  # 1 · Validate OpenSpec contracts  (only when specs or validator change)
  # ───────────────────────────────────────────────────────────────────────────
  validate-specs:
    name: Validate OpenSpec Contracts
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.specs == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: node scripts/validate-spec.js

  # ───────────────────────────────────────────────────────────────────────────
  # 2 · Controller CI  (only when controller/ or shared packages change)
  # ───────────────────────────────────────────────────────────────────────────
  ci-controller:
    name: Controller — Build, Lint & Test
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.controller == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Build
        run: npx turbo run build --filter=@omni/controller...
      - name: Lint
        run: npx turbo run lint --filter=@omni/controller
      - name: Test
        run: npx turbo run test --filter=@omni/controller
      - name: Validate specs
        run: node scripts/validate-spec.js

  # ───────────────────────────────────────────────────────────────────────────
  # 3 · Per-team CI  (matrix, path-filtered per team)
  # ───────────────────────────────────────────────────────────────────────────
  ci-team:
    name: "CI — ${{ matrix.team }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        team: [team-a, team-b, team-c, team-d]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Build (scoped)
        run: npx turbo run build --filter=@omni/${{ matrix.team }}...
      - name: Lint
        run: npx turbo run lint --filter=@omni/${{ matrix.team }}
      - name: Test
        run: npx turbo run test --filter=@omni/${{ matrix.team }}
      - name: Validate OpenSpec contracts
        run: node scripts/validate-spec.js

  # ───────────────────────────────────────────────────────────────────────────
  # 4 · Build artifacts  (team × ide matrix, runs after team CI passes)
  # ───────────────────────────────────────────────────────────────────────────
  build-artifacts:
    name: "Build — ${{ matrix.ide }} / ${{ matrix.team }}"
    needs: ci-team
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        team: [team-a, team-b, team-c, team-d]
        ide:  [vscode, cursor, jetbrains]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Build & Package
        run: node scripts/build.js --team ${{ matrix.team }} --ide ${{ matrix.ide }} --out artifacts

      # Upload as GHA artifact on every branch (prerelease / PR review use)
      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: omni-${{ matrix.ide }}-${{ matrix.team }}
          path: |
            artifacts/omni-${{ matrix.ide }}-${{ matrix.team }}-*.vsix
            artifacts/omni-${{ matrix.ide }}-${{ matrix.team }}-*.zip
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # 5 · GitHub Release  (main push only — commits to releases/ + gh release)
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build-artifacts
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: _downloads
          merge-multiple: true

      - name: Compute version & tag
        id: ver
        run: |
          VERSION=$(node -p "require('./teams/team-a/manifests/vscode.json').version")
          echo "version=$VERSION"                   >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${GITHUB_SHA::7}"   >> $GITHUB_OUTPUT
          echo "dest=releases/v${VERSION}"           >> $GITHUB_OUTPUT

      - name: Commit artifacts to releases/<version>/
        run: |
          mkdir -p "${{ steps.ver.outputs.dest }}"
          find _downloads -type f \( -name "*.vsix" -o -name "*.zip" \) \
            -exec cp {} "${{ steps.ver.outputs.dest }}/" \;
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/
          git stash
          git pull --rebase
          git stash pop
          git diff --cached --quiet || \
            git commit -m "release: v${{ steps.ver.outputs.version }} [skip ci]" && git push

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" \
            "${{ steps.ver.outputs.dest }}"/*.vsix \
            "${{ steps.ver.outputs.dest }}"/*.zip \
            --title "Omni IDE v${{ steps.ver.outputs.version }}" \
            --notes "Automated release from \`main\` — commit \`${{ github.sha }}\`." \
            --latest

  # ───────────────────────────────────────────────────────────────────────────
  # 6 · Per-team marketplace deploy  (isolated — manual trigger, main only)
  #     Each team's deploy is a SEPARATE job so one failure doesn't block
  #     another team's publish.
  # ───────────────────────────────────────────────────────────────────────────
  deploy-team-a:
    name: "Deploy — team-a"
    needs: release
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.deploy_team == 'team-a' || github.event.inputs.deploy_team == '')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Download team-a artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: omni-*-team-a
          merge-multiple: true
          path: artifacts
      - name: Publish team-a → VS Code Marketplace
        run: node scripts/deploy.js --team team-a --ide vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT_TEAM_A }}
      - name: Publish team-a → Open VSX (Cursor)
        run: node scripts/deploy.js --team team-a --ide cursor
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT_TEAM_A }}

  deploy-team-b:
    name: "Deploy — team-b"
    needs: release
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.deploy_team == 'team-b' || github.event.inputs.deploy_team == '')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Download team-b artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: omni-*-team-b
          merge-multiple: true
          path: artifacts
      - name: Publish team-b → VS Code Marketplace
        run: node scripts/deploy.js --team team-b --ide vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT_TEAM_B }}
      - name: Publish team-b → Open VSX (Cursor)
        run: node scripts/deploy.js --team team-b --ide cursor
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT_TEAM_B }}

  deploy-team-c:
    name: "Deploy — team-c"
    needs: release
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.deploy_team == 'team-c' || github.event.inputs.deploy_team == '')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Download team-c artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: omni-*-team-c
          merge-multiple: true
          path: artifacts
      - name: Publish team-c → VS Code Marketplace
        run: node scripts/deploy.js --team team-c --ide vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT_TEAM_C }}
      - name: Publish team-c → Open VSX (Cursor)
        run: node scripts/deploy.js --team team-c --ide cursor
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT_TEAM_C }}

  deploy-team-d:
    name: "Deploy — team-d"
    needs: release
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.deploy_team == 'team-d' || github.event.inputs.deploy_team == '')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Download team-d artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: omni-*-team-d
          merge-multiple: true
          path: artifacts
      - name: Publish team-d → VS Code Marketplace
        run: node scripts/deploy.js --team team-d --ide vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT_TEAM_D }}
      - name: Publish team-d → Open VSX (Cursor)
        run: node scripts/deploy.js --team team-d --ide cursor
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT_TEAM_D }}
