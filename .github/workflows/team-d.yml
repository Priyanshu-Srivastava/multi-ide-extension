name: Team D Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'teams/team-d/**'
      - 'packages/core/**'
      - 'packages/telemetry/**'
  pull_request:
    paths:
      - 'teams/team-d/**'
      - 'packages/core/**'
      - 'packages/telemetry/**'

jobs:
  build-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build affected packages
        run: npx turbo run build --filter=@omni/team-d...

      - name: Lint
        run: npx turbo run lint --filter=@omni/team-d

      - name: Test
        run: npx turbo run test --filter=@omni/team-d

      - name: Validate OpenSpec contracts
        run: node scripts/validate-spec.js
